services:

  aiometadata:
    image: "ghcr.io/cedya77/aiometadata:latest"
    container_name: "aiometadata"
    hostname: "aiometadata"
    restart: "unless-stopped"
    ports:
      - "3008:1337"
    volumes:
      - "${HOME}/AIOMetaData:/app/addon/data"
    environment:
      - "TZ=Europe/London"
      - "PORT=1337"
      - "HOST_NAME=https://aiometadata.jimeagle.com"
      - "NODE_ENV=production"
      - "REDIS_URL=redis://redis:6379"
      - "DATABASE_URI=sqlite://addon/data/db.sqlite"

  aiostreams:
    image: "ghcr.io/viren070/aiostreams:latest"
    container_name: "aiostreams"
    hostname: "aiostreams"
    restart: "unless-stopped"
    ports:
      - "3007:3000"
    environment:
      - "TZ=Europe/London"
      - "LOG_TIMEZONE=Europe/London"
      - "ADDON_NAME=Seven"
      - "ADDON_ID=aiostreams.jimeagle.com"
      - "BASE_URL=https://aiostreams.jimeagle.com"
      - "SECRET_KEY=${AIO_SECRET_KEY}"
    volumes:
      - "${HOME}/AIOStreams:/app/data"

  nzbdav:
    image: "nzbdav/nzbdav:latest"
    container_name: "nzbdav"
    hostname: "nzbdav"
    restart: "unless-stopped"
    ports:
      - "3010:3000"
    environment:
      - "PUID=1000"
      - "PGID=1000"
      - "UPGRADE=0.6.0"
    volumes:
      - "${HOME}/NzbDav:/config"
      - "${HOME}/Media:/media" # For finding broken media
      - "${HOME}/NzbDav/Downloads:/mnt"
    healthcheck:
      test: curl -f http://localhost:3000/health || exit 1
      interval: 1m
      retries: 3
      start_period: 5s
      timeout: 5s

  usenetstreamer:
    image: "ghcr.io/sanket9225/usenetstreamer:latest"
    container_name: "usenetstreamer"
    restart: "unless-stopped"
    ports:
      - "7000:7000"
    environment:
      ADDON_SHARED_SECRET: "${USENET_STREAMER_SECRET}"
      ADDON_BASE_URL: "https://usenetstreamer.jimeagle.com/"
      NZBDAV_URL: "http://nzbdav:3000"
      NZBDAV_WEBDAV_URL: "http://nzbdav:3000"
      CONFIG_DIR: "/data/config"
    volumes:
      - "${HOME}/UsenetStreamer:/data/config"

  rclone:
    image: "rclone/rclone:latest"
    container_name: "rclone"
    restart: "unless-stopped"
    environment:
      - "PUID=1000"
      - "PGID=1000"
      - "TZ=Europe/London"
    volumes:
      - "${HOME}/NzbDav/Downloads:/mnt:rshared"
      - "./rclone/rclone.conf:/config/rclone/rclone.conf"
    cap_add:
      - "SYS_ADMIN"
    security_opt:
      - "apparmor:unconfined"
    devices:
      - "/dev/fuse:/dev/fuse:rwm"
    privileged: true
    depends_on:
      nzbdav:
        condition: "service_healthy"
        restart: true
    command: >
      mount nzbdav: /mnt/remote/nzbdav
        --uid=1000
        --gid=1000
        --allow-other
        --links
        --use-cookies
        --vfs-cache-mode=full
        --vfs-cache-max-size=20G
        --vfs-cache-max-age=24h
        --buffer-size=0M
        --vfs-read-ahead=512M
        --dir-cache-time=20s
